<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functions</title>
</head>

<body>
    <h1>EXERCISE 2 — AGE COUNTER</h1>
    <h1 id="counter">18</h1>
    <button id="plus">Birthday</button>
    <button id="minus">Go One Year Back</button>
</body>
<script>
    let counterH1 = document.querySelector("#counter")
    let plusBtn = document.querySelector("#plus")
    let minusBtn = document.querySelector("#minus")
    console.log(counterH1)
    console.log(plusBtn)
    console.log(minusBtn)

    let counter = counterH1.innerHTML
    
    let increment = () => {
        counter++
        counterH1.innerHTML = counter
    }
    let decrement = () => {
        counter--
        counterH1.innerHTML = counter
    }
    plusBtn.addEventListener("click", increment)
    minusBtn.addEventListener("click", decrement)
</script>

</html>
